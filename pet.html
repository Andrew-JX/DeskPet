<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>DeskPet</title>
<style>
  :root {
    --bubble-bg: rgba(28, 28, 34, 0.92);
    --bubble-fg: #f4f4f6;
    --accent: #ffb74d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
  }

  /* 气泡 */
  #bubble {
    max-width: 200px;
    margin-bottom: 6px;
    padding: 8px 12px;
    background: var(--bubble-bg);
    color: var(--bubble-fg);
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.4;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    text-align: center;
    word-break: break-word;
  }
  #bubble.show { opacity: 1; transform: translateY(0); }
  #bubble::after {
    content: "";
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: -5px;
    border: 6px solid transparent;
    border-top-color: var(--bubble-bg);
    border-bottom: 0;
  }

  /* 宠物本体（可拖动窗口） */
  #pet {
    position: relative;
    -webkit-app-region: drag;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pet:active { cursor: grabbing; }
  /* 轻微“呼吸”：只做极小幅度上下浮动（不缩放，避免定格帧看着发胀），且仅静帧时启用 */
  @keyframes breathe { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  #petCanvas { display: block; image-rendering: pixelated; }
  #petCanvas.breathing { animation: breathe 4.5s ease-in-out infinite; }
  #placeholder {
    font-size: 90px;
    animation: bob 2.4s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* 悬停互动条 */
  #toolbar {
    -webkit-app-region: no-drag;
    display: flex;
    gap: 6px;
    margin-top: 6px;
    opacity: 0;
    transition: opacity .15s;
    pointer-events: none;
  }
  #stage:hover #toolbar { opacity: 1; pointer-events: auto; }
  #toolbar button {
    -webkit-app-region: no-drag;
    border: none;
    border-radius: 12px;
    padding: 4px 9px;
    font-size: 11px;
    background: rgba(255,255,255,0.9);
    color: #333;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #toolbar button:hover { background: var(--accent); color: #fff; }

  /* 迷你聊天输入 */
  #chatRow {
    -webkit-app-region: no-drag;
    display: none;
    gap: 4px;
    margin-top: 6px;
  }
  #chatRow.show { display: flex; }
  #chatInput {
    -webkit-app-region: no-drag;
    width: 150px;
    border: none;
    border-radius: 12px;
    padding: 5px 10px;
    font-size: 12px;
    outline: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  /* 写操作确认条 */
  #confirmRow {
    -webkit-app-region: no-drag;
    display: none;
    gap: 6px;
    margin-top: 6px;
  }
  #confirmRow.show { display: flex; }
  #confirmRow button {
    -webkit-app-region: no-drag;
    border: none; border-radius: 12px;
    padding: 5px 14px; font-size: 12px; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #confirmYes { background: var(--accent); color: #fff; }
  #confirmNo { background: rgba(255,255,255,0.9); color: #555; }
</style>
</head>
<body>
  <div id="stage">
    <div id="bubble"></div>
    <div id="pet">
      <canvas id="petCanvas" width="180" height="180" style="display:none"></canvas>
      <div id="placeholder">🐶</div>
    </div>
    <div id="toolbar"></div>
    <div id="chatRow">
      <input id="chatInput" type="text" placeholder="和我说点什么…" />
    </div>
    <div id="confirmRow">
      <button id="confirmYes">确认</button>
      <button id="confirmNo">取消</button>
    </div>
  </div>

<script>
let config = null;
let currentAsset = null;       // 当前宠物（待机素材来源）
let processedCanvas = null;    // 抠图后的整张图（图片素材）
let matCols = 1, matRows = 1, matFrames = [0], matFps = 0; // 当前播放素材的帧参数
let frameW = 0, frameH = 0;
let frameIndex = 0;
let lastFrameTime = 0;

let lastInteraction = Date.now();
let bubbleTimer = null;
let playingInterId = null;     // 正在播放的互动 id；null = 待机
let returnTimer = null;

const els = {
  bubble: document.getElementById('bubble'),
  pet: document.getElementById('pet'),
  canvas: document.getElementById('petCanvas'),
  placeholder: document.getElementById('placeholder'),
  toolbar: document.getElementById('toolbar'),
  chatRow: document.getElementById('chatRow'),
  chatInput: document.getElementById('chatInput'),
  confirmRow: document.getElementById('confirmRow'),
  confirmYes: document.getElementById('confirmYes'),
  confirmNo: document.getElementById('confirmNo')
};
let pendingProposalId = null;
const ctx = els.canvas.getContext('2d');

// ---- 气泡 ----
function say(text, ms = 3500) {
  els.bubble.textContent = text;
  els.bubble.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => els.bubble.classList.remove('show'), ms);
}

// ---- 绿幕抠图：把精灵图里的绿底变透明 ----
function chromaKey(img) {
  const off = document.createElement('canvas');
  off.width = img.naturalWidth;
  off.height = img.naturalHeight;
  const octx = off.getContext('2d');
  octx.drawImage(img, 0, 0);
  const data = octx.getImageData(0, 0, off.width, off.height);
  const px = data.data;
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i + 1], b = px[i + 2];
    // 绿色主导 → 透明（阈值偏宽容，覆盖常见绿幕）
    if (g > 90 && g > r * 1.35 && g > b * 1.35) {
      px[i + 3] = 0;
    }
  }
  octx.putImageData(data, 0, 0);
  return off;
}

// ---- 加载当前素材 ----
let videoEl = null, isVideo = false;
function stopVideo() {
  if (videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.src = ''; videoEl = null; }
  isVideo = false;
}

function loadCurrentPet() {
  currentAsset = ((config && config.assets) || []).find(a => a.id === config.currentAssetId) || null;
  playingInterId = null;
  clearTimeout(returnTimer);
  if (!currentAsset || !currentAsset.file) { showPlaceholder(); return; }
  showIdle();
}

// 把当前宠物自身当作「待机」素材
function idleMaterial() {
  if (!currentAsset) return null;
  return { type: currentAsset.type, file: currentAsset.file, cols: currentAsset.cols, rows: currentAsset.rows, frames: currentAsset.frames, fps: currentAsset.fps };
}
function showIdle() { playingInterId = null; playMaterial(idleMaterial()); }

// 播放一段素材：图片精灵图（抠绿幕+切帧）或视频（逐帧抠绿幕）
async function playMaterial(mat) {
  stopVideo();
  processedCanvas = null;
  if (!mat || !mat.file) { showPlaceholder(); return; }
  if (mat.type === 'video') { setupVideo(mat.file); return; }
  const dataUrl = await window.api.readMedia(mat.file);
  if (!dataUrl) { showPlaceholder(); return; }
  const img = new Image();
  img.onload = () => {
    processedCanvas = chromaKey(img);
    matCols = mat.cols || 1; matRows = mat.rows || 1;
    matFrames = (mat.frames && mat.frames.length) ? mat.frames : [0];
    matFps = mat.fps || 0;
    frameW = Math.floor(processedCanvas.width / matCols);
    frameH = Math.floor(processedCanvas.height / matRows);
    frameIndex = 0;
    sizeCanvas();
    els.placeholder.style.display = 'none';
    els.canvas.style.display = 'block';
    els.canvas.classList.add('breathing'); // 静帧才需要“呼吸”
    drawFrame();
  };
  img.onerror = () => showPlaceholder();
  img.src = dataUrl;
}

// ---- 视频：逐帧实时抠绿幕播放（绿底循环视频 → 透明、丝滑、真动）----
async function setupVideo(file) {
  const dataUrl = await window.api.readMedia(file);
  if (!dataUrl) { showPlaceholder(); return; }
  videoEl = document.createElement('video');
  videoEl.muted = true; videoEl.loop = true; videoEl.autoplay = true; videoEl.playsInline = true;
  videoEl.addEventListener('loadeddata', () => {
    sizeCanvas();
    els.placeholder.style.display = 'none';
    els.canvas.style.display = 'block';
    els.canvas.classList.remove('breathing'); // 视频自己会动，不需要呼吸
    isVideo = true;
    videoEl.play().catch(() => {});
  });
  videoEl.onerror = () => showPlaceholder();
  videoEl.src = dataUrl;
}

function drawVideoFrame() {
  if (!videoEl || videoEl.readyState < 2) return;
  const size = els.canvas.width;
  ctx.drawImage(videoEl, 0, 0, size, size);
  // 小画布上逐帧抠绿幕，开销很低；透明 webm 也兼容（无绿即不处理）
  const d = ctx.getImageData(0, 0, size, size), p = d.data;
  for (let i = 0; i < p.length; i += 4) {
    const r = p[i], g = p[i + 1], b = p[i + 2];
    if (g > 90 && g > r * 1.35 && g > b * 1.35) p[i + 3] = 0;
  }
  ctx.putImageData(d, 0, 0);
}

function showPlaceholder() {
  els.canvas.style.display = 'none';
  els.placeholder.style.display = 'block';
  els.placeholder.style.fontSize = ((config?.petSize || 180) * 0.5) + 'px';
}

function sizeCanvas() {
  const size = (config?.petSize || 180);
  els.canvas.width = size;
  els.canvas.height = size;
}

// ---- 画当前素材的帧（单帧定格 / 多帧循环）----
function drawFrame() {
  if (!processedCanvas) return;
  const idx = matFrames.length > 1 ? matFrames[frameIndex % matFrames.length] : matFrames[0];
  const sx = (idx % matCols) * frameW;
  const sy = Math.floor(idx / matCols) * frameH;
  const size = els.canvas.width;
  ctx.clearRect(0, 0, size, size);
  ctx.drawImage(processedCanvas, sx, sy, frameW, frameH, 0, 0, size, size);
}

// ---- 主循环 ----
// 视频：~30fps 逐帧抠绿幕；图片：单帧静止，多帧按 fps 循环
function tick(now) {
  if (isVideo) {
    if (now - lastFrameTime > 33) { lastFrameTime = now; drawVideoFrame(); }
  } else if (processedCanvas) {
    if (matFps > 0 && matFrames.length > 1 && now - lastFrameTime > 1000 / matFps) {
      lastFrameTime = now; frameIndex++; drawFrame();
    }
  } else {
    els.placeholder.textContent = '🐶';
  }
  requestAnimationFrame(tick);
}

// ---- 偶尔散步（移动窗口），待机且近期无互动时才走 ----
setInterval(() => {
  if (playingInterId) return;
  if (Date.now() - lastInteraction < 6000) return;
  if (Math.random() < 0.35) {
    let steps = 0;
    const dir = Math.random() < 0.5 ? -1 : 1;
    const walk = setInterval(() => {
      window.api.movePet(dir * 8, 0);
      if (++steps > 10) clearInterval(walk);
    }, 90);
  }
}, 18000);

// ---- 交互 ----
// 触发一个互动：播它的素材，几秒后（或下次互动前）回到待机
function playInteraction(it) {
  lastInteraction = Date.now();
  window.api.statEvent('interaction');
  playingInterId = it.id;
  if (it.file) playMaterial(it);   // 有素材就播；没传素材则保持待机
  const pool = config?.responses || ['汪~'];
  say(pool[Math.floor(Math.random() * pool.length)]);
  clearTimeout(returnTimer);
  returnTimer = setTimeout(() => { if (playingInterId === it.id) showIdle(); }, 4000);
}

async function petClicked() {
  lastInteraction = Date.now();
  window.api.statEvent('interaction');
  const pool = config?.responses || ['汪~'];
  say(pool[Math.floor(Math.random() * pool.length)]);
}

els.pet.addEventListener('click', petClicked);

// 双击宠物 → 打开聊天输入
els.pet.addEventListener('dblclick', () => {
  lastInteraction = Date.now();
  els.chatRow.classList.toggle('show');
  if (els.chatRow.classList.contains('show')) els.chatInput.focus();
});

function hideConfirm() { els.confirmRow.classList.remove('show'); pendingProposalId = null; }

els.chatInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const text = els.chatInput.value.trim();
  if (!text) return;
  els.chatInput.value = '';
  lastInteraction = Date.now();
  hideConfirm();
  say('……', 60000);            // 思考中
  const res = await window.api.aiChat(text);
  say(res.text, 8000);
  // 写操作：弹出确认按钮，等用户拍板
  if (res.proposal) {
    pendingProposalId = res.proposal.id;
    els.confirmRow.classList.add('show');
  }
});

els.confirmYes.addEventListener('click', async () => {
  if (!pendingProposalId) return;
  const id = pendingProposalId; hideConfirm();
  const res = await window.api.confirmTool(id, true);
  say(res.text, 5000);
});
els.confirmNo.addEventListener('click', async () => {
  if (!pendingProposalId) return;
  const id = pendingProposalId; hideConfirm();
  const res = await window.api.confirmTool(id, false);
  say(res.text, 3000);
});

// ---- 互动按钮（来自当前宠物的 interactions）----
function renderToolbar() {
  els.toolbar.innerHTML = '';
  const inters = (currentAsset && currentAsset.interactions) || [];
  inters.forEach(it => {
    const b = document.createElement('button');
    b.textContent = it.label;
    b.onclick = (ev) => { ev.stopPropagation(); playInteraction(it); };
    els.toolbar.appendChild(b);
  });
  // 固定一个「后台」入口
  const gear = document.createElement('button');
  gear.textContent = '⚙';
  gear.title = '后台管理';
  gear.onclick = (ev) => { ev.stopPropagation(); window.api.openPanel(); };
  els.toolbar.appendChild(gear);
}

// ---- 番茄钟 / 久坐提醒 ----
let pomoTimer = null, sitTimer = null;
function setupPomodoro() {
  clearInterval(pomoTimer); clearInterval(sitTimer);
  const p = config?.pomodoro;
  if (!p || !p.enabled) return;
  pomoTimer = setInterval(() => {
    window.api.statEvent('pomodoro');
    say(p.workEndMessage || '休息一下吧！', 6000);
  }, Math.max(1, p.workMinutes) * 60000);
  sitTimer = setInterval(() => {
    say(p.sitMessage || '起来走两步~', 6000);
  }, Math.max(1, p.sitReminderMinutes) * 60000);
}

// ---- 配置签名：只有宠物/素材/尺寸真正变化时才重载，避免统计广播导致视频不停重启 ----
function petSignature(cfg) {
  const a = ((cfg && cfg.assets) || []).find(x => x.id === cfg.currentAssetId);
  return JSON.stringify({
    size: cfg && cfg.petSize,
    a: a ? { id: a.id, t: a.type, f: a.file, c: a.cols, r: a.rows, fr: a.frames, fp: a.fps,
      it: (a.interactions || []).map(i => [i.id, i.label, i.type, i.file, i.cols, i.rows, i.frames, i.fps]) } : null
  });
}
function pomoSignature(cfg) { return JSON.stringify((cfg && cfg.pomodoro) || {}); }
let lastPetSig = '', lastPomoSig = '';

// ---- 初始化 ----
async function init() {
  config = await window.api.getConfig();
  lastPetSig = petSignature(config);
  lastPomoSig = pomoSignature(config);
  sizeCanvas();
  loadCurrentPet();
  renderToolbar();
  setupPomodoro();
  requestAnimationFrame(tick);
  // 开场打个招呼
  setTimeout(() => say(`嗨，我是${currentAsset?.name || config?.petName || '它'}，今天也一起加油~`), 800);
}

window.api.onConfigUpdated((cfg) => {
  config = cfg;
  const sig = petSignature(cfg);
  if (sig !== lastPetSig) {
    lastPetSig = sig;
    sizeCanvas();
    loadCurrentPet();
    renderToolbar();
  }
  const psig = pomoSignature(cfg);
  if (psig !== lastPomoSig) { lastPomoSig = psig; setupPomodoro(); }
});

init();
</script>
</body>
</html>
